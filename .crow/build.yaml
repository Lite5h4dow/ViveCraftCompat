when:
  - event:
    - tag
    - manual

steps:
  - name: build
    image: gradle:jdk21-corretto
    commands:
      - gradle build
      - mkdir -p /crow/build
      - cp ./build/libs/vivecraftcompat-1.21-$CI_COMMIT_TAG.jar /crow/build/

  - name: release
    depends_on:
      - build
    image: codeberg.org/woodpecker-plugins/release:latest
    settings:
      title: $CI_COMMIT_TAG
      api-key:
        from_secret: github-release-key
      files:
        - /crow/build/*.jar

